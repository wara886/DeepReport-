writer_backend:
  mode: template_only  # template_only | mock | remote | local_small
  common:
    timeout: 10
    retry: 1
    max_tokens: 512
    temperature: 0.2
  backends:
    mock:
      model_name: mock-writer
    remote:
      model_name: ""
      model_name_env: WRITER_REMOTE_MODEL
      base_url: ""
      base_url_env: WRITER_REMOTE_BASE_URL
      api_key: ""
      api_key_env: WRITER_REMOTE_API_KEY
    local_small:
      model_name: tiny-local
